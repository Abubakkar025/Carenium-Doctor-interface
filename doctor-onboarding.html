<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Carenium — Complete your doctor profile to get started with the platform.">
    <meta name="theme-color" content="#0a8fd4">
    <title>Carenium — Doctor Onboarding</title>
    <link rel="stylesheet" href="src/styles/variables.css">
    <link rel="stylesheet" href="src/styles/main.css">
</head>

<body>
    <div class="onboarding-page">
        <!-- Background -->
        <div class="onboarding-bg">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
        </div>

        <!-- Onboarding Card -->
        <div class="onboarding-card">
            <!-- Logout Button -->
            <button type="button" class="btn-logout" id="logoutBtn" title="Sign Out">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                <span>Sign Out</span>
            </button>

            <div class="onboarding-header">
                <div class="brand">
                    <svg viewBox="0 0 120 120" width="56" height="56">
                        <defs>
                            <linearGradient id="gradBlue" x1="0" y1="0" x2="1" y2="1">
                                <stop offset="0%" stop-color="#0a8fd4" />
                                <stop offset="100%" stop-color="#005f99" />
                            </linearGradient>
                        </defs>
                        <path d="M60 5 L110 30 V70 C110 95 85 115 60 115
                                 C35 115 10 95 10 70 V30 Z" fill="url(#gradBlue)" />
                        <polyline points="25,65 40,65 48,50 60,85 72,60 95,60" stroke="#ffffff" stroke-width="5"
                            fill="none" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <div>
                        <h1 class="brand-title">Welcome, Doctor</h1>
                        <p class="brand-subtitle">Complete your specialist profile to begin</p>
                    </div>
                </div>
            </div>

            <!-- Progress Steps -->
            <div class="onboarding-steps">
                <div class="step active" data-step="1">
                    <div class="step-number">1</div>
                    <span>Basic Info</span>
                </div>
                <div class="step-line"></div>
                <div class="step" data-step="2">
                    <div class="step-number">2</div>
                    <span>Specialty</span>
                </div>
                <div class="step-line"></div>
                <div class="step" data-step="3">
                    <div class="step-number">3</div>
                    <span>Credentials</span>
                </div>
                <div class="step-line"></div>
                <div class="step" data-step="4">
                    <div class="step-number">4</div>
                    <span>Schedule</span>
                </div>
            </div>

            <!-- Error Alert -->
            <div class="onboarding-error" id="onboardingError">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="15" y1="9" x2="9" y2="15" />
                    <line x1="9" y1="9" x2="15" y2="15" />
                </svg>
                <span id="onboardingErrorText">Error</span>
            </div>

            <!-- ONBOARDING FORM -->
            <form class="onboarding-form" id="onboardingForm" novalidate>
                <!-- STEP 1: Basic Info -->
                <div class="form-step active" id="formStep1">
                    <div class="form-group">
                        <label for="fullName">Full Name <span class="required">*</span></label>
                        <input type="text" class="form-input" id="fullName" placeholder="Dr. John Doe" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="phone">Phone Number <span class="required">*</span></label>
                            <input type="tel" class="form-input" id="phone" placeholder="+1 (555) 000-0000" required>
                        </div>
                        <div class="form-group">
                            <label for="department">Clinical Department <span class="required">*</span></label>
                            <input type="text" class="form-input" id="department" placeholder="e.g. Cardiology"
                                required>
                        </div>
                    </div>
                    <div class="form-actions">
                        <div></div>
                        <button type="button" class="btn btn-primary" onclick="Onboarding.nextStep(2)">
                            Continue
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18"
                                height="18">
                                <polyline points="9 18 15 12 9 6" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- STEP 2: Specialization -->
                <div class="form-step" id="formStep2">
                    <div class="form-group">
                        <label for="specialization">Medical Specialization <span class="required">*</span></label>
                        <select class="form-input" id="specialization" required>
                            <option value="" disabled selected>Select specialization</option>
                            <option value="General Physician">General Physician</option>
                            <option value="Cardiologist">Cardiologist</option>
                            <option value="Dermatologist">Dermatologist</option>
                            <option value="Orthopedic Surgeon">Orthopedic Surgeon</option>
                            <option value="Neurologist">Neurologist</option>
                            <option value="Pediatrician">Pediatrician</option>
                            <option value="Gastroenterologist">Gastroenterologist</option>
                            <option value="Psychiatrist">Psychiatrist</option>
                            <option value="Ophthalmologist">Ophthalmologist</option>
                            <option value="Oncologist">Oncologist</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="Onboarding.prevStep(1)">
                            Back
                        </button>
                        <button type="button" class="btn btn-primary" onclick="Onboarding.nextStep(3)">
                            Continue
                        </button>
                    </div>
                </div>

                <!-- STEP 3: Professional Details -->
                <div class="form-step" id="formStep3">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="experienceYears">Years of Experience <span class="required">*</span></label>
                            <input type="number" class="form-input" id="experienceYears" min="0" placeholder="8"
                                required>
                        </div>
                        <div class="form-group">
                            <label for="licenseNumber">Medical License No. <span class="required">*</span></label>
                            <input type="text" class="form-input" id="licenseNumber" placeholder="MCI-12345" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="qualification">Top Qualification <span class="required">*</span></label>
                        <input type="text" class="form-input" id="qualification" placeholder="e.g. MD Cardiology"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="hospitalName">Clinic / Hospital Name</label>
                        <input type="text" class="form-input" id="hospitalName" placeholder="Carenium General Hospital">
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="Onboarding.prevStep(2)">
                            Back
                        </button>
                        <button type="button" class="btn btn-primary" onclick="Onboarding.nextStep(4)">
                            Continue
                        </button>
                    </div>
                </div>

                <!-- STEP 4: Availability Schedule -->
                <div class="form-step" id="formStep4">
                    <div class="form-group">
                        <label>Working Days <span class="required">*</span></label>
                        <div class="availability-grid">
                            <label class="day-toggle"><input type="checkbox" name="day" value="Mon" checked>
                                <span>Mon</span></label>
                            <label class="day-toggle"><input type="checkbox" name="day" value="Tue" checked>
                                <span>Tue</span></label>
                            <label class="day-toggle"><input type="checkbox" name="day" value="Wed" checked>
                                <span>Wed</span></label>
                            <label class="day-toggle"><input type="checkbox" name="day" value="Thu" checked>
                                <span>Thu</span></label>
                            <label class="day-toggle"><input type="checkbox" name="day" value="Fri" checked>
                                <span>Fri</span></label>
                            <label class="day-toggle"><input type="checkbox" name="day" value="Sat">
                                <span>Sat</span></label>
                            <label class="day-toggle"><input type="checkbox" name="day" value="Sun">
                                <span>Sun</span></label>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="startTime">Start Time</label>
                            <input type="time" class="form-input" id="startTime" value="09:00">
                        </div>
                        <div class="form-group">
                            <label for="endTime">End Time</label>
                            <input type="time" class="form-input" id="endTime" value="17:00">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="slotDuration">Appointment Slot Duration (min) <span
                                class="required">*</span></label>
                        <select class="form-input" id="slotDuration">
                            <option value="15">15 Minutes</option>
                            <option value="30" selected>30 Minutes</option>
                            <option value="45">45 Minutes</option>
                            <option value="60">60 Minutes</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="Onboarding.prevStep(3)">
                            Back
                        </button>
                        <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                            <span class="btn-text">Complete clinical setup</span>
                            <span class="spinner"></span>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Core -->
    <script type="module" src="src/core/supabase.js"></script>
    <script type="module" src="src/modules/onboarding.js"></script>
    <script type="module">
        import { Onboarding } from './src/modules/onboarding.js';
        document.addEventListener('DOMContentLoaded', () => {
            Onboarding.init();
        });
    </script>
</body>

</html>
