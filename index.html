<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description"
    content="Carenium — Secure healthcare monitoring platform. Login to access real-time patient data and medical dashboards.">
  <meta name="theme-color" content="#0a8fd4">
  <title>Carenium — Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/src/styles/main.css">
</head>

<body>
  <div class="cosmic-bg">
    <div class="radial-glow"></div>
  </div>
  
  <div id="falling-container"></div>

  <div class="login-wrapper">
    <div class="login-card glass-card">
      <div class="login-header">
        <div class="brand">
          <div class="logo-shield">
            <svg viewBox="0 0 120 120" width="60" height="60">
              <path d="M60 5 L110 30 V70 C110 95 85 115 60 115 C35 115 10 95 10 70 V30 Z" fill="#1dd1a1" />
              <polyline points="30,65 45,65 52,50 62,85 72,60 90,60" stroke="#ffffff" stroke-width="6" fill="none"
                stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </div>
          <h1 class="brand-title">Carenium</h1>
          <p class="brand-subtitle">Health Intelligence Systems</p>
        </div>
      </div>

      <div class="auth-tabs" id="authTabs">
        <button class="auth-tab active" data-tab="signin" id="tabSignIn">Sign In</button>
        <button class="auth-tab" data-tab="signup" id="tabSignUp">Create Account</button>
        <div class="auth-tab-indicator" id="tabIndicator"></div>
      </div>

      <div class="auth-forms-container" id="authFormsContainer">
        <form class="auth-panel active" id="loginForm" novalidate>
          <div class="login-input-group">
            <input type="email" class="login-input" id="loginEmail" placeholder="Medical ID or Email" required>
            <span class="login-input-icon">📩</span>
          </div>
          <div class="login-input-group">
            <input type="password" class="login-input" id="loginPassword" placeholder="Access Password" required>
            <span class="login-input-icon">🔒</span>
          </div>
          <div id="loginError" style="display:none; color: #ff6b6b; font-size: 12px; margin-bottom: 10px; text-align: center;">
              <span id="loginErrorText"></span>
          </div>
          <button type="submit" class="login-btn" id="loginBtn">Authorize Access</button>
        </form>

        <form class="auth-panel" id="signupForm" novalidate style="display:none;">
          <div class="login-input-group">
            <input type="text" class="login-input" id="signupName" placeholder="Full Professional Name" required>
            <span class="login-input-icon">👤</span>
          </div>
          <div class="login-input-group">
            <input type="email" class="login-input" id="signupEmail" placeholder="Professional Email" required>
            <span class="login-input-icon">📩</span>
          </div>
          <div class="login-input-group">
            <select class="login-input login-select" id="signupRole" required>
              <option value="" disabled selected>Medical Specialization</option>
              <option value="doctor">Consultant / Doctor</option>
              <option value="nurse">Nursing Staff</option>
            </select>
          </div>
          <div class="login-input-group">
            <input type="password" class="login-input" id="signupPassword" placeholder="Secure Password" required>
            <span class="login-input-icon">🔒</span>
          </div>
          <button type="submit" class="login-btn" id="signupBtn">Register Provider</button>
          <div id="signupSuccess" style="display:none; color: #1dd1a1; font-size: 12px; margin-top: 10px; text-align: center;">
              Account created successfully. Please sign in.
          </div>
        </form>
      </div>

      <div class="login-footer">
        <p class="auth-switch" id="authSwitch">
          Already registered? <a href="#" id="switchToSignin">Sign In</a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="/src/main.js"></script>
  <button type="button" class="demo-access-btn" id="demoAccessBtn">
    <span class="icon">✨</span>
    Try Demo Dashboard
  </button>
</body>
</html>
